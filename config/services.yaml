# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.password_reset_ttl_seconds: 3600
    app.email_verification_ttl_seconds: 86400
    app.email_verification.secret: '%kernel.secret%'
    app.password_policy.min_length: 12
    app.password_policy.require_mixed_case: true
    app.password_policy.require_number: true
    app.password_policy.require_special: true
    app.client_token_ttl_seconds: 3600
    app.user_token_ttl_seconds: 3600
    app.user_refresh_token_ttl_seconds: 2592000
    app.ingest.sidecars.video_legacy_enabled: '%env(bool:APP_INGEST_VIDEO_LEGACY_SIDECARS_ENABLED)%'
    app.features.ai.suggest_tags: '%env(bool:APP_FEATURE_AI_SUGGEST_TAGS)%'
    app.features.ai.suggested_tags_filters: '%env(bool:APP_FEATURE_AI_SUGGESTED_TAGS_FILTERS)%'
    app.features.decisions.bulk: '%env(bool:APP_FEATURE_DECISIONS_BULK)%'
    app.feature_flags.contract.latest_version: '1.0.0'
    app.feature_flags.contract.accepted_versions: ['1.0.0', '0.9.0']
    app.two_factor.keyring: '%env(string:APP_2FA_KEYRING)%'
    app.two_factor.active_key_version: '%env(string:APP_2FA_ACTIVE_KEY_VERSION)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\User\Repository\UserRepositoryInterface: '@App\User\Repository\UserRepository'
    App\User\Repository\PasswordResetTokenRepositoryInterface: '@App\User\Repository\PasswordResetTokenRepository'
    App\User\UserTwoFactorStateRepositoryInterface: '@App\User\UserTwoFactorStateRepository'
    App\Asset\Repository\AssetRepositoryInterface: '@App\Asset\Repository\AssetRepository'
    App\Derived\DerivedUploadSessionRepositoryInterface: '@App\Derived\DerivedUploadSessionRepository'
    App\Derived\DerivedFileRepositoryInterface: '@App\Derived\DerivedFileRepository'
    App\Workflow\BatchMoveReportRepositoryInterface: '@App\Workflow\BatchMoveReportRepository'
    App\Auth\UserAuthSessionRepositoryInterface: '@App\Auth\UserAuthSessionRepository'
    App\Auth\AuthClientRegistryRepositoryInterface: '@App\Auth\AuthClientRegistryRepository'
    App\Auth\TechnicalAccessTokenRepositoryInterface: '@App\Auth\TechnicalAccessTokenRepository'
    App\Auth\AuthDeviceFlowRepositoryInterface: '@App\Auth\AuthDeviceFlowRepository'
    App\Auth\AuthMcpChallengeRepositoryInterface: '@App\Auth\AuthMcpChallengeRepository'
    App\Api\Service\AgentRuntimeRepositoryInterface: '@App\Api\Service\AgentRuntimeRepository'
    App\Api\Service\AgentJobProjectionRepositoryInterface: '@App\Api\Service\AgentJobProjectionRepository'
    App\Api\Service\AgentSignature\AgentPublicKeyRepositoryInterface: '@App\Api\Service\AgentSignature\AgentPublicKeyRepository'
    App\Api\Service\AgentSignature\AgentSignatureNonceRepositoryInterface: '@App\Api\Service\AgentSignature\AgentSignatureNonceRepository'
    App\Ingest\Service\ExistingProxyFilesystemInterface: '@App\Ingest\Service\ExistingProxyFilesystem'
    App\Storage\BusinessStorageRegistryInterface: '@App\Storage\BusinessStorageRegistry'
    App\Application\Agent\RegisterAgentUseCase: '@App\Application\Agent\RegisterAgentHandler'
    App\Application\Auth\ResolveAuthenticatedUserUseCase: '@App\Application\Auth\ResolveAuthenticatedUserHandler'
    App\Application\Auth\Port\AuthenticatedClientGateway: '@App\Infrastructure\Auth\AuthenticatedClientGateway'
    App\Application\Auth\Port\PasswordResetRequestRateLimiterGateway: '@App\Infrastructure\Auth\PasswordResetRequestRateLimiterGateway'
    App\Application\Auth\Port\EmailVerificationRequestRateLimiterGateway: '@App\Infrastructure\Auth\EmailVerificationRequestRateLimiterGateway'
    App\Application\AuthClient\Port\ClientTokenMintRateLimiterGateway: '@App\Infrastructure\Auth\ClientTokenMintRateLimiterGateway'
    App\Application\AuthClient\Port\DeviceFlowStartRateLimiterGateway: '@App\Infrastructure\Auth\DeviceFlowStartRateLimiterGateway'
    App\Application\AuthClient\Port\AuthClientGateway: '@App\Infrastructure\Auth\AuthClientAdminGateway'
    App\Application\AuthClient\Port\DeviceFlowGateway: '@App\Infrastructure\Auth\DeviceFlowGateway'
    App\Application\AuthClient\Port\DeviceApprovalSecondFactorGateway: '@App\Infrastructure\Auth\DeviceApprovalSecondFactorGateway'
    App\Application\AppPolicy\Port\AppFeatureGovernanceGateway: '@App\Infrastructure\AppPolicy\AppFeatureGovernanceGateway'
    App\Application\Auth\Port\AgentActorGateway: '@App\Infrastructure\Auth\AgentActorGateway'
    App\Application\Derived\Port\DerivedGateway: '@App\Infrastructure\Derived\DerivedGateway'
    App\Application\Workflow\Port\WorkflowGateway: '@App\Infrastructure\Workflow\WorkflowGateway'
    App\Application\Job\Port\JobGateway: '@App\Infrastructure\Job\JobGateway'
    App\Application\Asset\Port\AssetWorkflowGateway: '@App\Infrastructure\Asset\AssetWorkflowGateway'
    App\Application\Asset\Port\AssetPatchGateway: '@App\Infrastructure\Asset\AssetPatchGateway'
    App\Application\Asset\Port\AssetReadGateway: '@App\Infrastructure\Asset\AssetReadGateway'
    App\Api\Service\AgentSignature\AgentRequestSignatureVerifier: '@App\Api\Service\AgentSignature\GpgCliAgentRequestSignatureVerifier'
    App\Ingest\Port\FilePollerInterface: '@App\Ingest\Service\FilesystemFilePoller'
    App\Ingest\Port\ScanStateStoreInterface: '@App\Ingest\Repository\ScanStateStore'

    App\Storage\BusinessStorageRegistry:
        factory: ['@App\Storage\BusinessStorageRegistryFactory', 'create']

    App\Startup\StorageMarkerStartupValidator:
        public: true

    App\Application\Agent\RegisterAgentHandler:
        bind:
            bool $featureSuggestTagsEnabled: '%app.features.ai.suggest_tags%'
            bool $featureSuggestedTagsFiltersEnabled: '%app.features.ai.suggested_tags_filters%'
            bool $featureDecisionsBulkEnabled: '%app.features.decisions.bulk%'
            string $featureFlagsContractVersion: '%app.feature_flags.contract.latest_version%'
            array $acceptedFeatureFlagsContractVersions: '%app.feature_flags.contract.accepted_versions%'

    App\Application\Workflow\CheckBulkDecisionsEnabledHandler:
        bind:
            bool $bulkDecisionsEnabled: '%app.features.decisions.bulk%'

    App\Application\Job\CheckSuggestTagsSubmitScopeHandler:
        bind:
            bool $featureSuggestTagsEnabled: '%app.features.ai.suggest_tags%'

    App\Ingest\Service\SidecarFileDetector:
        bind:
            bool $videoLegacySidecarsEnabled: '%app.ingest.sidecars.video_legacy_enabled%'

    App\Infrastructure\Auth\PasswordResetRequestRateLimiterGateway:
        bind:
            Symfony\Component\RateLimiter\RateLimiterFactory $rateLimiterFactory: '@limiter.lost_password_request'

    App\Infrastructure\Auth\EmailVerificationRequestRateLimiterGateway:
        bind:
            Symfony\Component\RateLimiter\RateLimiterFactory $rateLimiterFactory: '@limiter.verify_email_request'

    App\Infrastructure\Auth\ClientTokenMintRateLimiterGateway:
        bind:
            Symfony\Component\RateLimiter\RateLimiterFactory $rateLimiterFactory: '@limiter.client_token_mint'

    App\Infrastructure\Auth\DeviceFlowStartRateLimiterGateway:
        bind:
            Symfony\Component\RateLimiter\RateLimiterFactory $rateLimiterFactory: '@limiter.device_flow_start'

    App\Feature\FeatureGovernanceRulesProvider:
        bind:
            bool $featureSuggestTagsEnabled: '%app.features.ai.suggest_tags%'
            bool $featureSuggestedTagsFiltersEnabled: '%app.features.ai.suggested_tags_filters%'
            bool $featureDecisionsBulkEnabled: '%app.features.decisions.bulk%'

    App\Application\AppPolicy\GetAppPolicyHandler:
        bind:
            bool $featureSuggestTagsEnabled: '%app.features.ai.suggest_tags%'
            bool $featureSuggestedTagsFiltersEnabled: '%app.features.ai.suggested_tags_filters%'
            bool $featureDecisionsBulkEnabled: '%app.features.decisions.bulk%'
            string $featureFlagsContractVersion: '%app.feature_flags.contract.latest_version%'
            array $acceptedFeatureFlagsContractVersions: '%app.feature_flags.contract.accepted_versions%'

    App\User\Service\TwoFactorSecretCipher:
        bind:
            string $keyringConfig: '%app.two_factor.keyring%'
            string $activeVersion: '%app.two_factor.active_key_version%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
