name: UI Release Auto-Update

on:
  schedule:
    - cron: "43 4 * * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ui-release-auto-update
  cancel-in-progress: false

jobs:
  auto-update-ui-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Auto-update UI release manifest
        env:
          RETAIA_UI_REPOSITORY: Retaia/retaia-ui
          GH_TOKEN: ${{ secrets.RETAIA_UI_REPO_TOKEN != '' && secrets.RETAIA_UI_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: bash scripts/auto-update-ui-release-manifest.sh

      - name: Commit and open or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z "$(git status --porcelain -- public/releases/latest.json)" ]]; then
            echo "No UI manifest update detected."
            exit 0
          fi

          UPDATE_BRANCH="codex/auto-update-ui-release-manifest"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/releases/latest.json
          git commit -m "chore(ui): auto-update release manifest"

          git push --force-with-lease origin HEAD:"${UPDATE_BRANCH}"

          EXISTING_PR_URL="$(gh pr list \
            --base master \
            --head "${UPDATE_BRANCH}" \
            --json url \
            --jq '.[0].url // ""')"

          if [[ -n "${EXISTING_PR_URL}" ]]; then
            echo "Updated existing PR: ${EXISTING_PR_URL}"
            exit 0
          fi

          gh pr create \
            --base master \
            --head "${UPDATE_BRANCH}" \
            --title "chore(ui): auto-update release manifest" \
            --body "Automated UI release manifest update."
