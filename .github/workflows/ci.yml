name: CI

on:
  push:
    branches:
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  branch-up-to-date:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check branch is rebased on base and linear
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: bash scripts/check-branch-up-to-date.sh

  pr-metadata:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate PR description structure
        run: bash scripts/check-pr-metadata.sh

  no-black-magic:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Check forbidden dynamic/runtime patterns
        run: ./scripts/no-black-magic.sh

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      APP_ENV: test
      APP_DEBUG: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Lint YAML config
        run: php bin/console lint:yaml config

      - name: Lint Symfony container
        run: php bin/console lint:container

      - name: Check translation keys en/fr
        run: php scripts/check-translation-keys.php

      - name: Check OpenAPI routes coverage
        run: php scripts/check-openapi-routes.php

      - name: Check OpenAPI contract snapshot drift
        run: php scripts/contracts-check.php

      - name: Check OpenAPI/API-CONTRACTS coherence
        run: php scripts/check-openapi-docs-coherence.php

      - name: Check unit-test purity boundaries
        run: php scripts/check-unit-purity.php

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      APP_ENV: test
      APP_DEBUG: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: pcov
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run OpenAPI runtime contract smoke
        run: composer test:openapi-contract

      - name: Run tests and enforce coverage
        run: composer test:quality

  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      APP_ENV: test
      APP_DEBUG: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run integration tests
        run: composer test:integration

  security-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      APP_ENV: test
      APP_DEBUG: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Composer security audit
        run: composer audit --no-interaction

  ci-required:
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - branch-up-to-date
      - pr-metadata
      - no-black-magic
      - lint
      - test
      - integration
      - security-audit
    steps:
      - name: Validate required CI fan-in
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          BRANCH_UP_TO_DATE_RESULT: ${{ needs.branch-up-to-date.result }}
          PR_METADATA_RESULT: ${{ needs.pr-metadata.result }}
          NO_BLACK_MAGIC_RESULT: ${{ needs.no-black-magic.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          INTEGRATION_RESULT: ${{ needs.integration.result }}
          SECURITY_AUDIT_RESULT: ${{ needs.security-audit.result }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            required_pr_results=(
              "$BRANCH_UP_TO_DATE_RESULT"
              "$PR_METADATA_RESULT"
            )
            for result in "${required_pr_results[@]}"; do
              if [ "$result" != "success" ]; then
                echo "Required PR CI dependency failed with result: $result" >&2
                exit 1
              fi
            done
          fi

          for result in \
            "$NO_BLACK_MAGIC_RESULT" \
            "$LINT_RESULT" \
            "$TEST_RESULT" \
            "$INTEGRATION_RESULT" \
            "$SECURITY_AUDIT_RESULT"
          do
            if [ "$result" != "success" ]; then
              echo "Required CI dependency failed with result: $result" >&2
              exit 1
            fi
          done
